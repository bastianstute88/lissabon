<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Lissabon">
<title>🇵🇹 Lissabon</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;
       justify-content:center;padding:24px;text-align:center}
  .flag{font-size:16px;letter-spacing:3px}
  h1{font-size:46px;font-weight:800;margin:6px 0 4px;line-height:1;
     background:linear-gradient(90deg,#046A38,#5fd98f,#DA291C);
     -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:42px}
  .btns{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px}
  a.card{display:flex;align-items:center;gap:16px;padding:20px 22px;border-radius:16px;
         text-decoration:none;color:#fff;background:#0d0d0d;border:1px solid rgba(255,255,255,.12);
         transition:transform .12s ease,border-color .2s}
  a.card:active{transform:scale(.98)}
  a.card.b{border-left:4px solid #046A38}
  a.card.s{border-left:4px solid #DA291C}
  .emoji{font-size:30px;flex-shrink:0}
  .txt{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
  .who{font-size:20px;font-weight:700}
  .desc{font-size:12px;color:rgba(255,255,255,.5)}
  .arr{margin-left:auto;font-size:22px;flex-shrink:0}
  .card.b .arr{color:#DA291C}   /* grüner Rahmen → roter Pfeil */
  .card.s .arr{color:#5fd98f}   /* roter Rahmen → grüner Pfeil */
  footer{margin-top:46px;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.5px}
</style>
</head>
<body>
  <div class="flag">🇵🇹</div>
  <h1>Lissabon</h1>
  <div class="sub">4.–8. November 2026</div>

  <div class="btns">
    <a class="card b" href="Lissabon_Bastian.html">
      <span class="emoji">👨🏼</span>
      <span class="who">Bastian</span>
      <span class="arr">→</span>
    </a>
    <a class="card s" href="Lissabon_Simone.html">
      <span class="emoji">👩🏼</span>
      <span class="who">Simone</span>
      <span class="arr">→</span>
    </a>
  </div>

  <footer>🇵🇹 &nbsp;Boa viagem!</footer>
</body>
</html>
